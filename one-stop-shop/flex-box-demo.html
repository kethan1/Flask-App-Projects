<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flex Box Demo</title>
    <style>
        .mystyle {
            margin: 2em;
            border: 1px solid black;
            padding: 2em;
        }
    </style>
</head>
<body>
    <h1>Flex Box Demo</h1>
    <div style="display: flex; flex-wrap: wrap;">
        <div class="mystyle"><p>1</p></div>
        <div class="mystyle"><p>2</p></div>
        <div class="mystyle"><p>3</p></div>
        <div class="mystyle"><p>4</p></div>
        <div class="mystyle"><p>5</p></div>
        <div class="mystyle"><p>6</p></div>
        <div class="mystyle"><p>7</p></div>
        <div class="mystyle"><p>8</p></div>
        <div class="mystyle"><p>9</p></div>
        <div class="mystyle"><p>10</p></div>
    </div>
</body>
</html>
